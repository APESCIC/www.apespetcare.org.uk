# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "www.apespetcare.org.uk"

[setup]
script = ""

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"

Write-Host "Setting up Codex worktree..."
Write-Host "Current directory: $(Get-Location)"

if (Test-Path "requirements.txt") {
    python -m pip install --upgrade pip
    python -m pip install -r requirements.txt
}

if (Test-Path "package-lock.json") {
    npm ci
}
elseif (Test-Path "package.json") {
    npm install
}

if (Test-Path "setup.ps1") {
    powershell -ExecutionPolicy Bypass -File ".\setup.ps1"
}
elseif (Test-Path "run\setup.ps1") {
    powershell -ExecutionPolicy Bypass -File ".\run\setup.ps1"
}
elseif (Test-Path "run\setup.sh") {
    Write-Host "run/setup.sh found, but this is Windows PowerShell. Skipping shell script."
}

Write-Host "Setup complete."
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
$ErrorActionPreference = "Continue"

Write-Host "Cleaning Codex worktree..."

if (Test-Path "docker-compose.yml") {
    docker compose down --remove-orphans
}
elseif (Test-Path "compose.yml") {
    docker compose down --remove-orphans
}

if (Test-Path ".cache\tmp") {
    Remove-Item ".cache\tmp" -Recurse -Force
}

Write-Host "Cleanup complete."
'''

[[actions]]
name = "npm run dev"
icon = "tool"
command = "npm run dev"

[[actions]]
name = "npm run build"
icon = "tool"
command = "npm run build"

[[actions]]
name = "npm test"
icon = "tool"
command = "npm test"
